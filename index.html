<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐋 Cá Voi Trái Tim - Trúc Phương</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 100, 150, 0.3), 0 0 120px rgba(255, 50, 100, 0.15);
            background: radial-gradient(ellipse at center, #0f1a2e 0%, #050810 100%);
            max-width: 98vw;
            max-height: 98vh;
            width: auto;
            height: auto;
            image-rendering: auto;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 220, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 150, 200, 0.15);
            pointer-events: none;
            z-index: 10;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 100, 200, 0.2);
        }
        .info span {
            color: rgba(255, 180, 220, 0.8);
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .info {
                font-size: 10px;
                padding: 5px 14px;
                bottom: 12px;
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="info">🐋 <span>Trúc Phương</span> · Cá Voi Trái Tim</div>

    <script>
        // ================================================================
        //  🐋  CÁ VOI BƠI THÀNH HÌNH TRÁI TIM  ❤️
        //  Bên trong trái tim có chữ "Trúc Phương"
        // ================================================================

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // ---- Kích thước canvas (tự động căn chỉnh) ----
        let W, H;

        function resizeCanvas() {
            const maxW = window.innerWidth * 0.95;
            const maxH = window.innerHeight * 0.95;
            // Tỉ lệ 4:3 hoặc gần vuông
            let w = Math.min(maxW, 900);
            let h = w * 0.75;
            if (h > maxH) { h = maxH;
                w = h / 0.75; }
            canvas.width = Math.floor(w);
            canvas.height = Math.floor(h);
            W = canvas.width;
            H = canvas.height;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            // Cập nhật lại quỹ đạo trái tim theo kích thước mới
            updateHeartPath();
        });

        // ---- THAM SỐ ----
        const WHALE_SIZE = 0.09; // tỉ lệ so với chiều rộng
        let whaleScale = 1;

        // ---- QUỸ ĐẠO TRÁI TIM ----
        let heartPoints = [];
        const NUM_POINTS = 400;

        function updateHeartPath() {
            heartPoints = [];
            const cx = W / 2;
            const cy = H / 2.1; // hơi lệch lên để đẹp
            const scale = Math.min(W, H) * 0.28;

            for (let i = 0; i < NUM_POINTS; i++) {
                const t = (i / NUM_POINTS) * Math.PI * 2;
                // Phương trình trái tim parametric
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                // Tỉ lệ và dịch chuyển
                const px = cx + x * scale * 0.045;
                const py = cy - y * scale * 0.045;
                heartPoints.push({ x: px, y: py });
            }
        }
        updateHeartPath();

        // ---- CÁ VOI ----
        let whale = {
            t: 0, // tham số vị trí trên đường trái tim (0 -> 2PI)
            speed: 0.0045,
            size: 1,
            angle: 0,
            tailWag: 0,
            eyeBlink: 0,
            finAngle: 0
        };

        // ---- NGÔI SAO (nền) ----
        let stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * 1200 - 100,
                y: Math.random() * 900 - 100,
                r: Math.random() * 1.8 + 0.5,
                twinkle: Math.random() * 0.05 + 0.02,
                phase: Math.random() * Math.PI * 2
            });
        }

        // ---- BONG BÓNG (hiệu ứng biển) ----
        let bubbles = [];
        for (let i = 0; i < 25; i++) {
            bubbles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 3 + 1.5,
                speed: Math.random() * 0.3 + 0.1,
                phase: Math.random() * Math.PI * 2
            });
        }

        // ---- HIỆU ỨNG NHẤP NHÁY CHO CHỮ ----
        let glowPhase = 0;

        // ================================================================
        //  VẼ CÁ VOI (theo hướng)
        // ================================================================
        function drawWhale(x, y, size, angle, tailPhase, finAngle) {
            const s = size * whaleScale;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // ---- Thân chính (ellipse) ----
            ctx.shadowColor = 'rgba(100, 180, 255, 0.2)';
            ctx.shadowBlur = 25;

            // Body gradient
            const grad = ctx.createRadialGradient(-s * 10, -s * 8, s * 2, 0, 0, s * 35);
            grad.addColorStop(0, '#6a9ec7');
            grad.addColorStop(0.3, '#4a7fa8');
            grad.addColorStop(0.7, '#2a5a7a');
            grad.addColorStop(1, '#1a3a52');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, s * 30, s * 16, 0, 0, Math.PI * 2);
            ctx.fill();

            // Bụng sáng
            ctx.shadowBlur = 10;
            ctx.fillStyle = 'rgba(180, 220, 255, 0.25)';
            ctx.beginPath();
            ctx.ellipse(s * 5, s * 6, s * 18, s * 8, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // ---- Đầu (mũi) ----
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#5a8aaa';
            ctx.beginPath();
            ctx.ellipse(s * 28, -s * 1, s * 12, s * 10, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Mũi tròn
            ctx.fillStyle = '#7aaec9';
            ctx.beginPath();
            ctx.arc(s * 34, -s * 2, s * 6, 0, Math.PI * 2);
            ctx.fill();

            // ---- Mắt ----
            ctx.shadowBlur = 0;
            // Tròng mắt
            ctx.fillStyle = '#f5f9ff';
            ctx.beginPath();
            ctx.ellipse(s * 22, -s * 6, s * 5, s * 5.5, 0.05, 0, Math.PI * 2);
            ctx.fill();
            // Con ngươi
            ctx.fillStyle = '#1a2a3a';
            ctx.beginPath();
            ctx.arc(s * 24, -s * 5, s * 2.8, 0, Math.PI * 2);
            ctx.fill();
            // Điểm sáng
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(s * 26, -s * 7, s * 1.2, 0, Math.PI * 2);
            ctx.fill();

            // ---- Miệng cười ----
            ctx.strokeStyle = '#1a2a3a';
            ctx.lineWidth = s * 1.2;
            ctx.beginPath();
            ctx.arc(s * 22, s * 3, s * 8, 0.1, 0.8);
            ctx.stroke();

            // ---- Vây lưng ----
            ctx.fillStyle = '#3a6a8a';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(-s * 2, -s * 14);
            ctx.quadraticCurveTo(s * 4, -s * 28, s * 12, -s * 16);
            ctx.fill();
            // Vây lưng thứ hai (nhỏ)
            ctx.beginPath();
            ctx.moveTo(s * 6, -s * 13);
            ctx.quadraticCurveTo(s * 10, -s * 22, s * 16, -s * 13);
            ctx.fill();

            // ---- Vây ngực (dưới bụng) ----
            ctx.fillStyle = '#4a7a9a';
            ctx.shadowBlur = 8;
            // Vây trái
            ctx.save();
            ctx.translate(s * 4, s * 10);
            ctx.rotate(finAngle * 0.3 + 0.2);
            ctx.beginPath();
            ctx.ellipse(0, s * 6, s * 8, s * 4, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // Vây phải
            ctx.save();
            ctx.translate(s * 4, s * 10);
            ctx.rotate(-finAngle * 0.3 - 0.2);
            ctx.beginPath();
            ctx.ellipse(0, -s * 6, s * 8, s * 4, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // ---- Đuôi (vẫy) ----
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#3a6a8a';
            // Đuôi chính
            ctx.save();
            ctx.translate(-s * 30, 0);
            ctx.rotate(tailPhase * 0.25);
            // Vây đuôi trên
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-s * 8, -s * 18, -s * 20, -s * 14);
            ctx.quadraticCurveTo(-s * 12, -s * 6, 0, 0);
            ctx.fill();
            // Vây đuôi dưới
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-s * 8, s * 18, -s * 20, s * 14);
            ctx.quadraticCurveTo(-s * 12, s * 6, 0, 0);
            ctx.fill();
            ctx.restore();

            // ---- Bóng đổ nhẹ ----
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.beginPath();
            ctx.ellipse(s * 2, s * 18, s * 24, s * 4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // ================================================================
        //  VẼ
        // ================================================================
        function draw() {
            // Cập nhật vị trí cá voi
            whale.t += whale.speed;
            if (whale.t > Math.PI * 2) whale.t -= Math.PI * 2;

            // Lấy vị trí trên đường trái tim
            const idx = Math.floor((whale.t / (Math.PI * 2)) * NUM_POINTS) % NUM_POINTS;
            const nextIdx = (idx + 1) % NUM_POINTS;
            const frac = ((whale.t / (Math.PI * 2)) * NUM_POINTS) % 1;

            const p1 = heartPoints[idx];
            const p2 = heartPoints[nextIdx];
            if (!p1 || !p2) return;

            const x = p1.x + (p2.x - p1.x) * frac;
            const y = p1.y + (p2.y - p1.y) * frac;

            // Tính góc (hướng di chuyển)
            const dx = p2.x - p1.x || 0.001;
            const dy = p2.y - p1.y || 0.001;
            let angle = Math.atan2(dy, dx);
            // Đầu cá hơi hướng lên cho tự nhiên
            angle += 0.08;

            // Cập nhật các hiệu ứng
            whale.tailWag += 0.06;
            whale.finAngle = Math.sin(whale.tailWag * 0.7) * 0.4;
            whale.eyeBlink = Math.sin(whale.tailWag * 0.3) * 0.1;

            // ---- Xóa màn hình ----
            ctx.clearRect(0, 0, W, H);

            // ---- Nền biển sâu ----
            const grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, W * 0.8);
            grad.addColorStop(0, '#0f1f35');
            grad.addColorStop(0.5, '#0a1425');
            grad.addColorStop(1, '#050a14');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // ---- Sóng nước (nhẹ) ----
            ctx.strokeStyle = 'rgba(40, 80, 140, 0.06)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                const yOff = i * 60 + 30;
                ctx.beginPath();
                for (let x = 0; x < W; x += 4) {
                    const yWave = yOff + Math.sin(x * 0.02 + Date.now() * 0.0005 + i * 0.8) * 6;
                    if (x === 0) ctx.moveTo(x, yWave);
                    else ctx.lineTo(x, yWave);
                }
                ctx.stroke();
            }

            // ---- Sao biển ----
            for (const star of stars) {
                const alpha = 0.3 + 0.5 * Math.sin(Date.now() * star.twinkle + star.phase);
                ctx.fillStyle = `rgba(255, 255, 240, ${alpha * 0.4})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- Bong bóng ----
            for (const b of bubbles) {
                const alpha = 0.15 + 0.1 * Math.sin(Date.now() * 0.001 + b.phase);
                ctx.strokeStyle = `rgba(150, 210, 255, ${alpha})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.stroke();
                // Điểm sáng trên bong bóng
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
                ctx.fill();
                // Di chuyển bong bóng lên
                b.y -= b.speed * 0.2;
                b.x += Math.sin(Date.now() * 0.0008 + b.phase) * 0.08;
                if (b.y < -10) { b.y = H + 10;
                    b.x = Math.random() * W; }
            }

            // ---- Vẽ đường trái tim (mờ) ----
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255, 80, 150, 0.07)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 10]);
            ctx.beginPath();
            for (let i = 0; i < heartPoints.length; i++) {
                const p = heartPoints[i];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);

            // ---- HIỆU ỨNG ÁNH SÁNG TRÁI TIM (phát sáng) ----
            const glowSize = Math.min(W, H) * 0.18;
            const gradHeart = ctx.createRadialGradient(W / 2, H / 2.1, 10, W / 2, H / 2.1, glowSize);
            gradHeart.addColorStop(0, 'rgba(255, 80, 150, 0.06)');
            gradHeart.addColorStop(0.5, 'rgba(255, 50, 120, 0.03)');
            gradHeart.addColorStop(1, 'rgba(255, 0, 80, 0)');
            ctx.fillStyle = gradHeart;
            ctx.fillRect(0, 0, W, H);

            // ---- VẼ CÁ VOI ----
            drawWhale(
                x, y,
                Math.min(W, H) * 0.018,
                angle,
                whale.tailWag,
                whale.finAngle
            );

            // ---- CHỮ "Trúc Phương" BÊN TRONG TRÁI TIM ----
            glowPhase += 0.02;
            const glow = 0.6 + 0.4 * Math.sin(glowPhase);

            // Đổ bóng chữ
            ctx.shadowColor = `rgba(255, 100, 200, ${0.3 * glow})`;
            ctx.shadowBlur = 40 + 20 * glow;

            // Chữ chính
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Viền chữ (để nổi bật)
            const fontSize = Math.min(W, H) * 0.07;
            ctx.font = `bold ${fontSize}px "Arial", "Segoe UI", "Helvetica Neue", sans-serif`;

            // Gradient cho chữ
            const textGrad = ctx.createLinearGradient(W / 2 - 80, H / 2.1 - 30, W / 2 + 80, H / 2.1 + 30);
            textGrad.addColorStop(0, `rgba(255, 180, 220, ${0.9 * glow})`);
            textGrad.addColorStop(0.5, `rgba(255, 100, 180, ${0.95 * glow})`);
            textGrad.addColorStop(1, `rgba(255, 200, 230, ${0.9 * glow})`);

            ctx.shadowBlur = 50 + 30 * glow;
            ctx.shadowColor = `rgba(255, 50, 150, ${0.4 * glow})`;
            ctx.fillStyle = textGrad;
            ctx.fillText('Trúc Phương', W / 2, H / 2.1 + 2);

            // Lớp chữ sáng bên trên
            ctx.shadowBlur = 80 + 40 * glow;
            ctx.shadowColor = `rgba(255, 150, 200, ${0.2 * glow})`;
            ctx.fillStyle = `rgba(255, 240, 250, ${0.3 * glow})`;
            ctx.fillText('Trúc Phương', W / 2 - 1, H / 2.1 - 1);

            // ---- Trang trí trái tim nhỏ xung quanh (bong bóng ánh sáng) ----
            for (let i = 0; i < 12; i++) {
                const angleHeart = i / 12 * Math.PI * 2 + Date.now() * 0.0002;
                const rad = Math.min(W, H) * 0.14;
                const hx = W / 2 + Math.cos(angleHeart) * rad;
                const hy = H / 2.1 + Math.sin(angleHeart) * rad * 0.85;
                const size = 2 + Math.sin(Date.now() * 0.002 + i) * 1.5;
                const alpha = 0.15 + 0.1 * Math.sin(Date.now() * 0.001 + i * 0.7);
                ctx.fillStyle = `rgba(255, 100, 180, ${alpha})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(255, 50, 150, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(hx, hy, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- Lớp phủ ánh sáng mờ ----
            ctx.shadowBlur = 0;
            const vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.9);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, W, H);

            requestAnimationFrame(draw);
        }

        // ---- XỬ LÝ RESIZE ----
        window.addEventListener('resize', () => {
            resizeCanvas();
            updateHeartPath();
        });

        // ---- BẮT ĐẦU ----
        draw();

        console.log('🐋 Cá Voi Trái Tim - Trúc Phương');
        console.log('❤️  Yêu thương vô bờ bến!');
    </script>
</body>
</html>
